<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - Rota FAM</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      background: linear-gradient(#d9e3ea, #eef2f5);
      display: flex; justify-content: center; align-items: center; height: 100vh;
    }

    .container {
      width: 360px; background: #fff; border-radius: 25px; padding: 25px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .logo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 15px;
    }

    .logo h1 { font-size: 28px; color: #1f4a5a; }

    .title { text-align: center; font-size: 22px; color: #1f4a5a; margin-top: 10px; }

    .subtitle {
      text-align: center; font-size: 14px; margin: 10px 0 20px; color: #555;
    }

    .form-box {
      background: #f7f7f7; padding: 15px; border-radius: 20px;
    }

    .input-group { margin-bottom: 15px; }

    .input-group label {
      font-size: 13px; display: block; margin-bottom: 5px; color: #333;
    }

    .input-field {
      display: flex; align-items: center; background: white;
      border-radius: 10px; border: 1px solid #ccc; padding: 8px;
    }

    .input-field span { margin-right: 8px; }

    .input-field input {
      border: none; outline: none; width: 100%;
    }

    .btn {
      width: 100%; padding: 12px; border-radius: 20px; border: none;
      background: #1f4a5a; color: white; font-weight: bold;
      margin-top: 10px; cursor: pointer;
    }

    .link {
      text-align: center; margin-top: 12px; font-size: 14px;
    }

    .link a {
      color: #1f4a5a; text-decoration: underline; cursor: pointer;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="logo">
    <div style="width: 60px; height: 60px; background: #1f4a5a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 24px;">FAM</div>
    <h1>Rota FAM</h1>
  </div>

  <div class="title">Redefinir Senha</div>

  <p class="subtitle">Digite sua nova senha.</p>

  <div class="form-box">

    <form method="POST">

      <div class="input-group">
        <label>Nova Senha</label>
        <div class="input-field">
          <span>🔒</span>
          <input type="password" name="senha" placeholder="Sua nova senha" required>
        </div>
      </div>

      <button type="submit" class="btn">Salvar</button>

    </form>

    <div class="link">
      <a href="/">Voltar para o Login</a>
    </div>

  </div>

</div>

</body>
</html>
